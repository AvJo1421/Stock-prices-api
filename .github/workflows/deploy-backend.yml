name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'stock-prices-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit stock-prices-api/ \
            --tag europe-west2-docker.pkg.dev/stockflow-deployment/stockflow/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy stockflow-api \
            --image europe-west2-docker.pkg.dev/stockflow-deployment/stockflow/api:latest \
            --platform managed \
            --region europe-west2 \
            --allow-unauthenticated \
            --memory 2Gi \
            --timeout 300 \
            --min-instances 1 \
            --set-env-vars "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},POLYGON_API_KEY=${{ secrets.POLYGON_API_KEY }}"